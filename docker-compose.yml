version: '3.8'

services:
  # 🌐 FRONTEND SERVICE (NEW)
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000" # 🎯 Exposed so users can access the web application interface
    env_file: ./frontend/.env
    restart: unless-stopped
    depends_on:
      - gateway # Waits for the API gateway to start up first
    networks:
      - trip_planner_network

  # 🎯 API GATEWAY
  gateway:
    build:
      context: ./backend/gateway
    ports:
      - "5000:5000" # 🎯 Exposed because the client browser talks directly to this endpoint
    env_file: ./backend/gateway/.env
    restart: unless-stopped
    networks:
      - trip_planner_network

  # 🔒 USER SERVICE
  user:
    build:
      context: ./backend/user
    env_file: ./backend/user/.env
    restart: unless-stopped
    networks:
      - trip_planner_network

  # 🔒 TRIP SERVICE
  trip:
    build:
      context: ./backend/trip
    env_file: ./backend/trip/.env
    restart: unless-stopped
    networks:
      - trip_planner_network

  # 🤖 AI SERVICE
  ai:
    build:
      context: ./backend/ai
    env_file: ./backend/ai/.env
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      TRIP_SERVICE_URL: http://trip:4001
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trip_planner_network

  # ⚙️ AI BACKGROUND WORKER
  ai-worker:
    build:
      context: ./backend/ai
    command: npm run worker
    env_file: ./backend/ai/.env
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      TRIP_SERVICE_URL: http://trip:4001
    depends_on:
      redis:
        condition: service_healthy
      ai:
        condition: service_started
    networks:
      - trip_planner_network

  # 🧠 REDIS CACHE / QUEUE
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trip_planner_network

volumes:
  redis_data:

networks:
  trip_planner_network:
    driver: bridge